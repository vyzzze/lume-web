<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lume</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown paths to index with hash
      // so the client router can handle them.
      var segmentCount = 1; // /lume-web/
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?p=/" +
        l.pathname.split("/").slice(1 + segmentCount).join("/").replace(/&/g, "~and~") +
        (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
